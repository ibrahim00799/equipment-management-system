<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All Registered Equipment</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <h1>All Registered Equipment</h1>

  <table id="equipmentTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>Type</th>
        <th>Cost</th>
        <th>Room</th>
        <th>Registered By</th>
        <th>Date</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <nav>
    <ul>
      <li><a href="/">Home</a></li>
      <li><a href="/register-equipment">Register Equipment</a></li>
      <li><a href="/edit-equipment">Edit Equipment</a></li>
      <li><a href="/delete-equipment">Delete Equipment</a></li>
      <li><a href="/view-all" class="active">View All</a></li>
      <li><a href="/about">About</a></li>
      <li><a href="/help">Help</a></li>
    </ul>
  </nav>

  <script>
    fetch('/api/all-equipment')
      .then(res => res.json())
      .then(data => {
        const tbody = document.querySelector("tbody");

        if (data.length === 0) {
          tbody.innerHTML = `<tr><td colspan="7">No equipment found.</td></tr>`;
          return;
        }

        data.forEach(item => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${item.name}</td>
            <td>${item.type}</td>
            <td>€${item.cost}</td>
            <td>${item.room}</td>
            <td>${item.registeredBy}</td>
            <td>${new Date(item.date).toLocaleDateString()}</td>
            <td>
              <a href="/edit-equipment?id=${item._id}">Edit</a> |
              <a href="#" onclick="deleteEquipment('${item._id}')">Delete</a>
            </td>
          `;
          tbody.appendChild(row);
        });
      });

    function deleteEquipment(id) {
      if (confirm("Are you sure you want to delete this equipment?")) {
        fetch('/delete', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ id })
        })
        .then(res => res.text())
        .then(data => {
          alert(data);
          location.reload();
        })
        .catch(err => {
          alert('Error deleting equipment.');
          console.error(err);
        });
      }
    }
  </script>
</body>
</html>
